name: Phoenix V100 (Integrated Guardian)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-integrated-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # Install Chrome and Virtual Display
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          
          # Install Python dependencies
          pip install playwright playwright-stealth requests pyvirtualdisplay
          playwright install chromium
          
          # Free up space
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: 🔥 Run Phoenix Integrated Engine
        timeout-minutes: 300 
        env:
          PYTHONIOENCODING: utf-8
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: |
          # Launch Python script (the script itself handles the display.start() call)
          python -u main.py

      - name: Trigger Next Run
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          sleep 600
          # Ensure this filename matches your actual .yml file name
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/YOUR_FILENAME.yml/dispatches" \
            -d '{"ref":"main"}'
