name: Phoenix V100 (Integrated Guardian)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: read

jobs:
  run-integrated-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: 🔥 Run Phoenix Integrated Engine
        timeout-minutes: 300 
        env:
          PYTHONUNBUFFERED: "1"
          # These secrets are now the only ones required
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GROUP_URL: ${{ secrets.GROUP_URL }}
        run: python -u main.py

      - name: Trigger Next Run
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: gh workflow run main.yml
